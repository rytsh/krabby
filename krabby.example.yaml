# krabby example configuration.
# Copy to krabby.yaml (auto-discovered in cwd) or point CONFIG_FILE at it.
# Every field can also be set via env with the KRABBY_ prefix,
# e.g. KRABBY_SERVER_PORT=9090, KRABBY_MCP_API_KEY=....

log_level: info

# Clones, graphs and state live here.
data_dir: ~/.krabby

server:
  host: ""
  port: "8080"
  # base_path: /krabby   # serve the whole app (UI, REST API, MCP, webhook)
                         # under a URL prefix, e.g. behind a reverse proxy on a
                         # subpath. Empty (default) serves everything at root.
                         # The UI uses a hash router + relative assets, so it is
                         # base-path agnostic and needs no rebuild.

mcp:
  path: /mcp
  # api_key: change-me            # require X-Api-Key / Bearer on /mcp

git:
  # ssh_key_path: ~/.ssh/id_ed25519   # for private repos
  poll_interval: 1h                    # 0 disables background polling

graphify:
  bin: graphify              # graphify CLI (uv tool install graphifyy)
  # python: /path/to/python  # interpreter that can `import graphify` (auto-detected)
  build_timeout: 30m         # graph queries are answered in-process (no serve subprocess)
  # exclude:                 # extra gitignore-style patterns kept out of the graph
  #   - "testdata/"          # (defaults already skip testdata/, fixtures/, *.min.js, …)
  #   - "examples/"
  # merge: false             # build a cross-repo merged graph (queried when a graph
                             # tool is called with no repo id). Off by default:
                             # independent repos share no symbols, so the merge is
                             # just a costly disjoint union. Enable only for split
                             # monorepos / interdependent modules.

webhook:
  # github_secret: change-me  # verifies X-Hub-Signature-256 on /webhook/github

# --- Documentation + RAG + code search (optional) ----------------------------
# Generate markdown docs per repo (LLM), embed docs and/or raw source code, and
# expose semantic retrieval over MCP and REST. All three capabilities have
# independent enabled switches and run best-effort.

docs:
  enabled: false            # generate markdown docs in the refresh pipeline
  concurrency: 8            # parallel per-file summary LLM calls
  # summary_model: ...      # fast model for the many per-file summary calls
                            # (e.g. gemini-2.5-flash). Reuses the llm base_url/
                            # api_key/timeout below; only the model differs. The
                            # slower main model is used only for final synthesis.
                            # Blank = use the main model for everything.
  # max_groups: 40          # cap on grouped summary calls per run
  include: ["**/*"]         # source globs to document (repo-relative)
  exclude: ["**/*_test.go", "vendor/**", "**/testdata/**"]

llm:                        # OpenAI-compatible chat (doc generation, ask_docs)
  # base_url: https://api.openai.com/v1
  # api_key: sk-...
  model: gpt-4o-mini
  timeout: 60s

embedder:                   # OpenAI-compatible embeddings (RAG)
  # base_url: http://localhost:11434/v1   # e.g. ollama
  # api_key: ""
  # model: nomic-embed-text
  # dim: 768                # 0 = infer from first response
  batch: 64
  timeout: 30s

# Dedicated source-code embedder. Leave base_url empty to reuse `embedder`
# above. Codestral Embed is optimized for natural-language-to-code retrieval.
code_embedder:
  # base_url: https://api.mistral.ai/v1
  # api_key: ...
  # model: codestral-embed-2505
  # dim: 0                  # infer from first response
  batch: 64
  timeout: 30s

rag:
  enabled: false            # index docs + enable retrieval tools
  chunk_size: 1200          # target chunk length (chars)
  chunk_overlap: 200
  top_k: 20                 # chunk matches fetched before grouping
  top_docs: 5               # whole documents returned

code_rag:
  enabled: false            # index source + enable search_code
  chunk_size: 3000          # Codestral's recommended target (chars)
  chunk_overlap: 1000       # used for fallback / oversized symbols
  top_k: 10                 # snippets returned
  # include: ["**/*.go", "**/*.ts"] # empty = built-in source extensions
  exclude: ["vendor/", "node_modules/", "**/*.min.js", "**/generated/**"]

# Repositories to track at startup. More can be added at runtime via the
# add_repo MCP tool or POST /api/v1/repos.
repos:
  - url: git@github.com:rakunlabs/ada.git
  - url: git@github.com:rakunlabs/chu.git
    branch: main

telemetry: {}
